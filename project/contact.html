<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - The Bistro Cafe</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    /* Centers the form container */
    form {
        max-width: 600px; /* Limits how wide the form gets */
        margin: 0 auto;   /* Centers the form in the middle of the page */
    }

    /* Centers text for labels and fieldsets */
    fieldset {
        border: 1px solid #DCDCDC;
        margin-bottom: 20px;
        padding: 20px;
        text-align: center; /* This centers the labels and text inside */
    }

    /* Center the input boxes and textareas */
    input, textarea {
        padding: 8px;
        border: 1px solid #DCDCDC;
        width: 90%;
        max-width: 400px;
        margin: 5px auto; /* Centers the boxes */
        display: block; 
    }

    /* Keep the labels as blocks but make sure they don't force a left-align */
    label {
        display: block;
        margin-top: 15px;
        font-weight: bold;
        color: #3E2723;
    }

    /* Keep radio buttons from centering individually so they stay near their text */
    .radio-group {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-bottom: 10px;
    }

    .radio-group label {
        display: inline-flex;
        align-items: center; /* Vertical alignment */
        margin: 0 20px;      /* Space between the two options */
        font-weight: normal;
        color: #3E2723;
    }

    /* Radio Button Spacing */
    input[type="radio"] {
        width: auto;
        margin-right: 2px; /* Adds a small gap between the circle and the word */
        cursor: pointer;
    }

    /* Styled Submit and Reset Buttons */
    input[type="submit"], input[type="reset"] {
        background-color: #3E2723;
        color: white;
        padding: 12px 24px;
        border: none;
        font-weight: bold;
        cursor: pointer;
        width: 100%;
        max-width: 400px;
        display: block;
        margin: 10px auto;
    }

    input[type="submit"]:hover, input[type="reset"]:hover {
        background-color: #5D4037;
    }
  </style>
</head>
<body>
  <div id="wrapper">
    <header>
      <h1>The Bistro Cafe</h1>
    </header>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="history.html">History</a></li>
        <li><a href="specials.html">Specials</a></li>
        <li><a href="contact.html">Contact Us</a></li>
      </ul>
    </nav>
    <main>
        <form method="post" action="https://www.mccinfo.net/webresources/cgi-bin/formmail.asp">         
        <input type="hidden" name="to" value="lhess@mail.mccneb.edu">
        <input type="hidden" name="subject" value="INFO1311 Final Project Laura Hess">
        <fieldset>
        <legend>Personal Information</legend>

        <label for="fname">First Name:</label>
        <input type="text" id="fname" name="fname">

        <label for="lname">Last Name:</label>
        <input type="text" id="lname" name="lname">

        <label for="email">Email:</label>
        <input type="email" id="email" name="email">

        <label for="tel">Phone Number:</label>
        <input type="tel" id="tel" name="tel">

        </fieldset>
        <fieldset>
            <legend>Enter Your Message Here</legend>
            <p>Preferred Contact Method:</p>
            <div class="radio-group">
                <label><input type="radio" name="contact_pref" value="email"> Email</label>
                <label><input type="radio" name="contact_pref" value="phone"> Phone</label>
            </div>
    
            <label for="message">Enter your message here:</label>
            <textarea id="message" name="message" rows="4" cols="50" placeholder="Enter your message here..."></textarea>
            <input type="submit" value="Send Message">
            <input type="reset" value="Clear Form">
        </fieldset>
        </form>
    </main>
    <footer>
        <a href="index.html">Home</a> |
        <a href="history.html">History</a> |
        <a href="specials.html">Specials</a> |
        <a href="contact.html">Contact Us</a>
        <p>&copy; 2026 The Bistro Cafe | <a href="mailto:lhess@mail.mccneb.edu">lhess@mail.mccneb.edu</a></p>
    </footer>
  </div>
</body>
</html>
